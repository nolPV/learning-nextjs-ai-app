name: Nextjs Workshop Demo

on:
  push:
    branches:
      - 'feature-**'

jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - run: node -v
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
